name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint project
        run: npm run lint

      - name: Build site
        run: npm run build

  accessibility:
    name: Accessibility
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Locate Chrome
        run: |
          chrome_path="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$chrome_path" ]; then
            echo "Chrome was not found on PATH."
            exit 1
          fi
          echo "CHROME_PATH=$chrome_path" >> "$GITHUB_ENV"
          "$chrome_path" --version

      - name: Run Pa11y CI
        run: npm run audit:a11y

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Locate Chrome
        run: |
          chrome_path="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$chrome_path" ]; then
            echo "Chrome was not found on PATH."
            exit 1
          fi
          echo "CHROME_PATH=$chrome_path" >> "$GITHUB_ENV"
          "$chrome_path" --version

      - name: Run Lighthouse CI
        run: npm run audit:lighthouse
